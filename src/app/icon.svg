<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#bgGradient)"/>
  
  <!-- Border -->
  <rect x="3" y="3" width="94" height="94" rx="17" fill="none" stroke="url(#textGradient)" stroke-width="3"/>
  
  <!-- Letter B -->
  <text x="50" y="68" font-family="Arial, sans-serif" font-size="55" font-weight="bold" fill="url(#textGradient)" text-anchor="middle">B</text>
  
  <!-- Decorative dots -->
  <circle cx="20" cy="20" r="4" fill="#fbbf24"/>
  <circle cx="80" cy="80" r="4" fill="#22d3ee"/>
</svg>
